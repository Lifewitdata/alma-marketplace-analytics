version: 2

sources:
  - name: raw
    description: >
      Raw tables loaded from source systems (provider onboarding, patient CRM,
      matching engine logs, and billing/EHR). In production these would be
      loaded by Fivetran/Airbyte into the warehouse; here they are CSVs
      generated by scripts/generate_synthetic_data.py.
    schema: raw
    tables:
      - name: providers
        description: One row per therapist on the Alma platform.
        columns:
          - name: provider_id
            description: Primary key.
            tests:
              - unique
              - not_null
          - name: status
            description: "'active' or 'churned'"

      - name: patients
        description: One row per patient who signed up looking for care.
        columns:
          - name: patient_id
            description: Primary key.
            tests:
              - unique
              - not_null

      - name: payers
        description: Insurance payer reference table.
        columns:
          - name: payer_id
            description: Primary key.
            tests:
              - unique
              - not_null

      - name: matches
        description: One row per patient-provider match attempt.
        columns:
          - name: match_id
            description: Primary key.
            tests:
              - unique
              - not_null
          - name: patient_id
            tests:
              - not_null
          - name: provider_id
            tests:
              - not_null

      - name: sessions
        description: One row per therapy session / billable claim.
        columns:
          - name: session_id
            description: Primary key.
            tests:
              - unique
              - not_null
